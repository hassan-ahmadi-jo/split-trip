{% extends 'base.html' %}

{% block title %}
  Success |
{% endblock %}

{% block content %}
<!-- 🔴 EVENT DELETE SUCCESS PAGE -->
<div class="min-h-[75vh] flex items-center justify-center px-4">
  <!-- Success Card -->
  <div class="bg-gray-800 border border-gray-700/80 rounded-2xl shadow-2xl p-8 max-w-md w-full text-center relative overflow-hidden">
    
    <!-- Background Glow Effect (Red for Deletion) -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-red-500/20 rounded-full blur-3xl"></div>

    <!-- Success Icon (Trash Bin) -->
    <div class="mx-auto w-20 h-20 bg-gray-900/50 border border-red-500/30 rounded-full flex items-center justify-center mb-6 shadow-inner relative z-10">
      <svg class="w-10 h-10 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
    </div>

    <!-- Titles -->
    <h1 class="text-2xl font-bold text-gray-100 tracking-tight mb-2 relative z-10">Event Deleted</h1>
    <p class="text-gray-400 text-sm mb-10 relative z-10">The event and all its associated data have been permanently removed.</p>

    <!-- Actions (Buttons) -->
    <div class="flex flex-col gap-3 relative z-10">
      <!-- Back to Events List (Primary Action) -->
      <a href="{% url 'home' %}"" class="w-full flex items-center justify-center gap-2 px-6 py-3.5 rounded-xl bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-medium shadow-lg shadow-cyan-500/25 transition-all duration-300">
        Return to Home
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
      </a>

    </div>

  </div>
</div>
{% endblock %}
