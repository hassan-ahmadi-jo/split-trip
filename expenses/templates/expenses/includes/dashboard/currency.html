  <!-- Currency Section -->
  <form class="mt-5 js-ajax-form" method="post" action="{% url 'currency_handler' event_code=event.code %}">
    <h2 class="text-xl text-cyan-400 font-bold mb-4">Select your currency</h2>
    {% csrf_token %}
    <section class="flex flex-wrap items-center justify-start gap-4">
      {% for currency in event.currencys.all %}
        {% if currency.is_active %}
          <div class="flex flex-col gap-1 items-center justify-center">
            <p class="px-3 py-1 rounded-md text-cyan-400 border-2 border-cyan-400 bg-cyan-400/10 text-sm font-medium">{{ currency.title }}</p>
            <p title="The active one cant be deleted" class="mt-2 remove-botton-disabled">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </p>
          </div>
        {% else %}
          <div class="flex flex-col gap-1 items-center justify-center">
            <button name="active" value="{{ currency.id }}" type="submit" class="js-access-restricted px-3 py-1 transition hover:text-cyan-400 text-gray-400 text-sm font-medium cursor-pointer">{{ currency.title }}</button>
            <button name="remove" value="{{ currency.id }}" title="Remove" class="mt-2 remove-button js-access-restricted">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 group-hover/delete:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
        {% endif %}
      {% endfor %}

      <!-- Add Currency Button -->
      <div class="flex flex-col gap-1 items-center justify-center ml-2">
        <a href="{% url 'currency_create' event_code=event.code %}" class="js-access-restricted w-8 h-8 flex items-center justify-center !rounded-full bg-gray-800 border border-gray-600 text-gray-400 transition hover:text-cyan-400 hover:border-cyan-400 hover:bg-cyan-900/30" title="Add Currency">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
        </a>
        <p class="invisible remove-button mt-2">
          <svg class="w-4 h-4"></svg>
        </p>
      </div>
    </section>
  </form>
