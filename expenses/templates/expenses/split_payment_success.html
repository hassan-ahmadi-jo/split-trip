{% extends 'base.html' %}
{% load static %}

{% block title %}
  Success |
{% endblock %}

{% block content %}
    <section class="relative left-1/2 right-1/2 -ml-[50vw] -mr-[50vw] w-screen z-10 bg-[#0a0f16] flex items-center justify-center p-4 relative overflow-hidden font-sans text-gray-200">

      <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-cyan-600/20 rounded-full mix-blend-screen filter blur-[128px] pointer-events-none"></div>
      <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-600/10 rounded-full mix-blend-screen filter blur-[128px] pointer-events-none"></div>


      <div class="relative w-full max-w-md animate-scale-in mt-30 mb-30">

        <div class="bg-black/40 backdrop-blur-2xl border border-gray-800/80 rounded-[2.5rem] p-8 sm:p-10 shadow-2xl flex flex-col items-center text-center relative overflow-hidden">

          <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-1 bg-gradient-to-r from-transparent via-emerald-500 to-transparent opacity-70"></div>


          <div class="w-28 h-28 rounded-full bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center mb-8 animate-glow relative">

            <div class="absolute inset-0 rounded-full border border-emerald-400/20 scale-110"></div>
            <div class="absolute inset-0 rounded-full border border-emerald-400/10 scale-125"></div>

            <svg class="w-12 h-12 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path class="path-check" d="M5 13l4 4L19 7"></path>
            </svg>
          </div>


          <h1 class="text-3xl font-black tracking-tight mb-3 text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">Expense Logged!</h1>
          <p class="text-gray-400 text-sm leading-relaxed mb-8 px-4">The split payments have been perfectly balanced and saved to the event's ledger.</p>


          <div class="w-full bg-gray-900/60 border border-gray-800/80 rounded-2xl p-4 mb-10 flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400">
                <i class="fas fa-file-invoice-dollar"></i>
              </div>
              <div class="text-left">
                <div class="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-0.5">Status</div>
                <div class="text-sm font-semibold text-gray-200">Recorded & Balanced</div>
              </div>
            </div>

            <div class="w-6 h-6 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center text-xs">
              <i class="fas fa-check"></i>
            </div>
          </div>

          <div class="w-full space-y-3">

            <a href="{% url "dashboard" event_code=event.code %}" class="group relative flex items-center justify-center w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-4 px-8 rounded-2xl shadow-lg shadow-cyan-900/30 transform hover:-translate-y-1 transition-all duration-300">
              <i class="fas fa-chart-pie mr-2 opacity-80 group-hover:scale-110 transition-transform"></i>
              Event Dashboard
            </a>

            <a href="{% url "expenses_create" event_code=event.code %}" class="group flex items-center justify-center w-full bg-transparent hover:bg-gray-800/50 text-gray-400 hover:text-white font-medium py-3.5 px-8 rounded-2xl border border-gray-800 hover:border-gray-700 transition-all duration-300">
              <i class="fas fa-plus mr-2 text-xs"></i>
              Add Another Expense
            </a>
          </div>
        </div>
      </div>
    </section>

{% endblock %}
